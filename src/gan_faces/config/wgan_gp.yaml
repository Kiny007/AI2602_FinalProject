# [修改] 统一使用 DCGAN 原论文风格超参数；WGAN-GP 对照配置只切换 gan_loss。
dataset: folder
data_root: data/celeba/img_align_celeba
download: false
output_dir: outputs/wgan_gp_acc
batch_size: 128
image_size: 64
latent_dim: 100
generator_features: 64
discriminator_features: 64
lr: 0.0002
beta1: 0.5
beta2: 0.999
gan_loss: wgan_gp
gp_lambda: 10.0
n_dis: 1
mixed_precision: fp16
workers: 0
kimg_per_log: 0.5
total_kimg: 5000.0
sample_every_kimg: 50.0
save_every_kimg: 50.0
eval_every_kimg: 50.0
metrics: "fid5k"
eval_data_root: ""
eval_verbose: false
no_eval_cache: false
ema_decay: 0.999
tensorboard_dir: ""
no_tensorboard: false
resume: ""
seed: 42
gradient_accumulation_steps: 1
allow_tf32: false
