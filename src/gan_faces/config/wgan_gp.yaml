# WGAN-GP uses the improved_wgan_training 64x64 ResNet generator/critic.
dataset: folder
data_root: data/celeba/img_align_celeba
download: false
output_dir: outputs/wgan_gp_acc
batch_size: 64
image_size: 64
latent_dim: 128
generator_features: 64
discriminator_features: 64
model_type: wgan_gp
lr: 0.0001
beta1: 0.0
beta2: 0.9
gan_loss: wgan_gp
gp_lambda: 10.0
n_dis: 5
mixed_precision: "no"
workers: 0
kimg_per_log: 0.5
total_kimg: 5000.0
sample_every_kimg: 50.0
save_every_kimg: 50.0
eval_every_kimg: 50.0
metrics: "fid5k"
eval_data_root: ""
eval_verbose: false
no_eval_cache: false
ema_decay: 0.999
tensorboard_dir: ""
no_tensorboard: false
resume: ""
seed: 42
gradient_accumulation_steps: 1
allow_tf32: false
