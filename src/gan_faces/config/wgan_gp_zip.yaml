# WGAN-GP uses the DCGAN 64x64 architecture with a LayerNorm-style critic.
dataset: folder
data_root: data/celeba_64.zip
download: false
output_dir: outputs/wgan_gp_acc_zip_new
batch_size: 64
image_size: 64
latent_dim: 100
generator_features: 128
discriminator_features: 128
model_type: wgan_gp
lr: 0.0001
beta1: 0.0
beta2: 0.9
gan_loss: wgan_gp
gp_lambda: 10.0
n_dis: 5
mixed_precision: "bf16"
workers: 4
kimg_per_log: 0.5
total_kimg: 5000.0
sample_every_kimg: 100.0
save_every_kimg: 100.0
eval_every_kimg: 100.0
metrics: "fid5k"
eval_data_root: ""
eval_verbose: false
no_eval_cache: false
ema_decay: 0.999
tensorboard_dir: ""
no_tensorboard: false
resume: ""
seed: 42
gradient_accumulation_steps: 1
allow_tf32: false
